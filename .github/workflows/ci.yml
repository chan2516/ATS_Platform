name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run on demand from the GitHub UI: Actions → CI → "Run workflow" (no deploy, just tests/build).
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      # mvnw must be executable on Linux (Windows checkouts may omit +x in git).
      - name: Test
        run: chmod +x mvnw && ./mvnw -B test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
