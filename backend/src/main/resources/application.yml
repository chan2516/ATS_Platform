spring:
  application:
    name: backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ats}
    username: ${SPRING_DATASOURCE_USERNAME:ats}
    password: ${SPRING_DATASOURCE_PASSWORD:ats}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 32

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  storage:
    local:
      root-directory: ${RESUME_STORAGE_ROOT:./data/resumes}
  resume:
    max-size-bytes: ${RESUME_MAX_BYTES:5242880}
    allowed-content-types:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
  jwt:
    # HS256: at least 32 bytes. Override in production via JWT_SECRET.
    secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    # Single access token (MVP). Refresh tokens can be added in a later phase.
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} - %msg%n"
